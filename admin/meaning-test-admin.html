<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LOGOS Admin Test</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17201b;
      --muted: #5b6660;
      --line: #cfd8d2;
      --panel: #f7f8f5;
      --accent: #1f6f62;
      --accent-strong: #154f46;
      --warn: #a85b00;
      --bad: #9c2f2f;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 440px) minmax(0, 1fr);
    }

    .input-pane {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .output-pane {
      padding: 18px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      min-width: 0;
    }

    h1 {
      font-size: 18px;
      font-weight: 650;
      margin: 0;
    }

    h2 {
      font-size: 14px;
      font-weight: 650;
      margin: 0 0 8px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
      padding: 10px 11px;
      outline: none;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 111, 98, 0.14);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: var(--white);
      min-height: 38px;
      padding: 0 14px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button.secondary {
      background: var(--white);
      color: var(--accent-strong);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }

    .status.error {
      color: var(--bad);
    }

    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .tab {
      border: 0;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      min-height: 36px;
      padding: 0 10px;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent-strong);
      border-bottom-color: var(--accent);
    }

    .result-grid {
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--white);
    }

    .kv {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 8px 12px;
      margin: 0;
    }

    .kv dt {
      color: var(--muted);
      font-weight: 650;
    }

    .kv dd {
      margin: 0;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .flag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 9px;
      font-size: 12px;
      color: var(--muted);
      background: var(--panel);
      margin: 0 6px 6px 0;
    }

    .flag.warn {
      color: var(--warn);
      border-color: rgba(168, 91, 0, 0.35);
      background: rgba(168, 91, 0, 0.08);
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }

      .input-pane {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .row,
      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <form class="input-pane" id="meaning-form">
      <h1>LOGOS Admin Test</h1>

      <label>
        Сырой смысл
        <textarea name="raw_meaning" required>Если человек получает безопасное пространство, он перестаёт быть в режиме защиты и у него появляются силы действовать спокойнее.</textarea>
      </label>

      <label>
        Аудитория
        <input name="audience_context" value="первый личный тест">
      </label>

      <div class="row">
        <label>
          Язык
          <select name="language">
            <option value="ru" selected>ru</option>
            <option value="uk">uk</option>
            <option value="en">en</option>
            <option value="mixed">mixed</option>
          </select>
        </label>
        <label>
          Scope
          <select name="scope">
            <option value="universal" selected>universal</option>
            <option value="runtime">runtime</option>
          </select>
        </label>
      </div>

      <label>
        Желаемый переход
        <textarea name="desired_change">От “безопасность делает слабее” к “безопасность возвращает ресурс и способность действовать”.</textarea>
      </label>

      <label>
        Риски прочтения
        <textarea name="risk_notes">Может прозвучать так, будто один человек обязан создавать безопасность, а другой обязан вернуть ресурс.</textarea>
      </label>

      <label>
        Источник
        <input name="source" value="local admin personal test">
      </label>

      <div class="actions">
        <button type="submit" id="submit-button">Получить ответ</button>
        <button type="button" class="secondary" id="reset-button">Сброс</button>
      </div>
      <div class="status" id="status">Готово</div>
    </form>

    <section class="output-pane">
      <div class="tabs" role="tablist">
        <button class="tab active" type="button" data-tab="preview">Preview</button>
        <button class="tab" type="button" data-tab="dialogue">Диалог</button>
        <button class="tab" type="button" data-tab="issue">Issue</button>
        <button class="tab" type="button" data-tab="json">JSON</button>
      </div>
      <div class="result-grid" id="result"></div>
    </section>
  </main>

  <script>
    const form = document.querySelector("#meaning-form");
    const result = document.querySelector("#result");
    const statusLine = document.querySelector("#status");
    const submitButton = document.querySelector("#submit-button");
    const resetButton = document.querySelector("#reset-button");
    const tabs = [...document.querySelectorAll(".tab")];
    let activeTab = "preview";
    let lastPreview = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formPayload() {
      const data = new FormData(form);
      return Object.fromEntries(data.entries());
    }

    function setStatus(message, isError = false) {
      statusLine.textContent = message;
      statusLine.classList.toggle("error", isError);
    }

    function renderPreview(data) {
      return `
        <div class="section">
          <h2>LOGOS Chain Draft</h2>
          <dl class="kv">
            <dt>Human Truth</dt><dd>${escapeHtml(data.human_truth_candidate)}</dd>
            <dt>Contradiction</dt><dd>${escapeHtml(data.human_contradiction_candidate)}</dd>
            <dt>Old Frame</dt><dd>${escapeHtml(data.old_frame)}</dd>
            <dt>New Frame</dt><dd>${escapeHtml(data.new_frame)}</dd>
            <dt>Meaning Atom</dt><dd>${escapeHtml(data.meaning_atom_draft)}</dd>
            <dt>Emotional Result</dt><dd>${escapeHtml(data.emotional_result_draft)}</dd>
          </dl>
        </div>
        <div class="section">
          <h2>Boundary</h2>
          <span class="flag">WF-0001 preview ready</span>
          <span class="flag warn">WF-0002 blocked</span>
          <span class="flag warn">YAML promotion blocked</span>
          <pre>${escapeHtml(data.wf_0002.blocked_reason)}</pre>
        </div>
        <div class="section">
          <h2>Story Pattern</h2>
          <pre>${escapeHtml(data.story_pattern_draft)}</pre>
        </div>
      `;
    }

    function renderDialogue(data) {
      const questions = data.next_questions
        .map((question, index) => `<dt>${index + 1}</dt><dd>${escapeHtml(question)}</dd>`)
        .join("");
      return `
        <div class="section">
          <h2>Следующие вопросы</h2>
          <dl class="kv">${questions}</dl>
        </div>
        <div class="section">
          <h2>Risk Notes</h2>
          <pre>${escapeHtml(data.risk_notes)}</pre>
        </div>
      `;
    }

    function renderIssue(data) {
      return `
        <div class="section">
          <h2>${escapeHtml(data.wf_0001_issue.title)}</h2>
          <pre>${escapeHtml(data.wf_0001_issue.body)}</pre>
        </div>
      `;
    }

    function renderJson(data) {
      return `
        <div class="section">
          <h2>Raw Preview JSON</h2>
          <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
        </div>
      `;
    }

    function render() {
      if (!lastPreview) {
        result.innerHTML = `
          <div class="section">
            <h2>Preview</h2>
            <pre>Введите сырой смысл и нажмите кнопку.</pre>
          </div>
        `;
        return;
      }
      const renderers = {
        preview: renderPreview,
        dialogue: renderDialogue,
        issue: renderIssue,
        json: renderJson
      };
      result.innerHTML = renderers[activeTab](lastPreview);
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        activeTab = tab.dataset.tab;
        tabs.forEach((item) => item.classList.toggle("active", item === tab));
        render();
      });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitButton.disabled = true;
      setStatus("Считаю preview...");
      try {
        const response = await fetch("/api/admin/preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formPayload())
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Preview failed");
        lastPreview = payload;
        setStatus("Preview готов");
        render();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        submitButton.disabled = false;
      }
    });

    resetButton.addEventListener("click", () => {
      form.reset();
      lastPreview = null;
      setStatus("Готово");
      render();
    });

    render();
  </script>
</body>
</html>
