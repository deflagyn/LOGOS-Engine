title: "Visible care vs invisible health"

human_truth: >
  Люди природно частіше дбають про те, що бачать щодня.
  Саме тому видима краса легше стає звичкою, ніж турбота про невидиме здоров'я.

observation: >
  Жінки можуть регулярно вкладати час, увагу і гроші у волосся, шкіру, нігті та тіло,
  але відкладати турботу про жіноче здоров'я, бо воно не знаходиться перед очима щодня.

universal_pattern: >
  Видиме отримує регулярну увагу. Невидиме часто отримує увагу лише після тривоги.

meaning_resource:
  - любов до себе
  - бажання спокою
  - звичка доглядати за собою
  - відповідальність за майбутнє
  - повага до власного тіла

connected_objects:
  human_contradiction: HC-0001
  belief_shift: BS-0001
