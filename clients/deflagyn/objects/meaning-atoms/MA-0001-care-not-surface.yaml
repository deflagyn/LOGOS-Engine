title: "Care does not end at the surface"

meaning_atom: "Справжня турбота про себе не закінчується на поверхні."

short_variants:
  - "Турбота не закінчується на поверхні."
  - "Себе важливо берегти не лише зовні."
  - "Не все найцінніше можна побачити."
  - "Любов до себе починається не лише з дзеркала."
  - "Турбота про себе — це більше, ніж те, що видно."

why_it_works: >
  The phrase changes the definition of self-care without attacking existing beauty habits.
  It does not reject visible care. It expands it.

