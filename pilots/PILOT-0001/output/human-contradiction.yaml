title: "Противоречие: безопасность может быть интерпретирована как зависимость или право на отдачу"
review_required: true
law_promotion_allowed: false
human_truth_id: HT-PILOT-0001
human_contradiction: |-
  То, что безопасность рождает отдых и ресурсы, не означает автоматически, что мужчина обязан расширяться или что женщина обязана предоставлять безопасность; также этот механизм может быть неверно использован как инструмент давления («ты мне дала безопасность — ты мне должна»).
inner_tension:
  self_image: "Человек может видеть себя либо как благодарного получателя опоры, либо как эксплуататора, если ожидания не согласованы."
  behavior_gap: "Ожидание, что один акт безопасности автоматически вызовет желаемую отдачу/поведение другого, часто расходится с реальным взаимодействием и намерениями партнёра."
  emotional_cost: "Неразрешённые ожидания могут привести к обиде, чувству использования или вины; безопасность, воспринимаемая как долг, снижает искренность привязанности."
derived_interpretation: |-
  Интерпретация подчёркивает риск неэтичного использования модели: взаимная отдача должна быть добровольной и обсуждённой. Сохранены края исходной цепочки (ME-PILOT-0001), но добавлен акцент на границы и согласие. Статус: candidate. Источник: RM-PILOT-0001, ME-PILOT-0001.
test_note: |-
  Требуется ревью (review_required: true). law_promotion_allowed: false. Этическая оговорка: избегать оправдания принуждения или права на вознаграждение как должного — использовать модель для понимания, а не для манипуляции.
