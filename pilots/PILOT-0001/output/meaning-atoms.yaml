title: "Атом смысла: безопасность → восстановление → расширение → отдача"
review_required: true
law_promotion_allowed: false
belief_shift_id: BS-PILOT-0001
meaning_atom: "Когда один партнёр даёт безопасное пространство, это позволяет другому восстановиться, что увеличивает его ресурсы и способность расширяться и делиться плодами расширения обратно."
short_variants:
  - "Безопасность питает восстановление и совместный рост."
  - "Опора порождает ресурс — ресурс порождает расширение — расширение возвращает благо."
  - "Отдых в безопасности превращается в новые возможности и совместные выгоды."
why_it_works: |-
  Психологически: снижение бдительности и стрессовой нагрузки восстанавливает когнитивные и эмоциональные ресурсы. Социально: восстановлённые ресурсы направляются на внешние проекты или роли, что может увеличить материальные/символические ресурсы, которыми делятся внутри пары. Метафорические элементы (территории/захват) полезны для нарративов, но не обязательны для интерпретации.
