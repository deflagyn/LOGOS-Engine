title: "Сюжетный шаблон: цикл безопасности и отдачи"
review_required: true
law_promotion_allowed: false
meaning_atom_id: MA-PILOT-0001
structure: |-
  1) Инициация: женщина/партнёр создаёт безопасное пространство (SafeSpace). 2) Ответ: мужчина снижает бдительность, отдыхает и привязывается (RestAndAttachment). 3) Накопление: восстановление переводится в внутренние ресурсы (ResourceIncrease). 4) Экспансия: с увеличенными ресурсами идёт выход во внешние сферы, 'захват' новых возможностей (TerritorialExpansion). 5) Обратная связь: плоды экспансии разделяются с женщиной/партнёром (ResourceSharingWithWoman).
use_case: |-
  Генерация сцен для художественных текстов, драматургии; шаблоны для коучинга по отношениям (как модель динамики), игровые механики «восстановление→ресурс→расширение→вознаграждение». В любом использовании необходимо отмечать добровольность, границы и избегать манипуляций.
example_meaning_atom: "Безопасность → Восстановление → Ресурсы → Новые возможности → Совместная отдача (ссылка на MA-PILOT-0001)."
derived_interpretation: |-
