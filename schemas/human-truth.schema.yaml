$schema: "https://json-schema.org/draft/2020-12/schema"
title: Human Truth
version: 0.1

type: object
required:
  - id
  - type
  - status
  - language
  - title
  - human_truth
properties:
  id:
    type: string
    description: "Stable ID such as HT-0001."
  type:
    const: human_truth
  status:
    type: string
    enum:
      - raw
      - candidate
      - draft
      - testing
      - validated
      - rejected
      - archived
  language:
    type: string
    enum:
      - en
      - ru
      - uk
      - mixed
  client:
    type: string
  scope:
    type: string
    enum:
      - universal
      - runtime
  title:
    type: string
  human_truth:
    type: string
  observation:
    type: string
  universal_pattern:
    type: string
  meaning_resource:
    type: array
    items:
      type: string
  connected_objects:
    type: object
    additionalProperties: true
  notes:
    type: string
additionalProperties: true
